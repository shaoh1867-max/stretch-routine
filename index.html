<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movement Library — Harrison's Stretch &amp; Mobility Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --surface2:   #222222;
      --border:     #2e2e2e;
      --text:       #f0ede8;
      --muted:      #7a7672;
      --accent:     #e8a020;
      --accent-dim: #6b4a0e;
      --radius:     8px;
      --ease:       300ms ease;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 2.25rem 1.5rem 1.75rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .site-title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2.6rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 0.95;
    }

    .site-title .accent { color: var(--accent); }

    .site-subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 400;
      margin-top: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 1.5rem 1.5rem 0;
      max-width: 1200px;
      margin: 0 auto;
    }

    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.45rem 1.05rem;
      border-radius: 999px;
      cursor: pointer;
      transition: background var(--ease), border-color var(--ease), color var(--ease);
      white-space: nowrap;
    }

    .pill:hover { border-color: var(--accent); color: var(--text); }

    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 600;
    }

    .pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── GRID ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.1rem;
    }

    @media (min-width: 600px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 960px)  { .grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── CARD WRAPPER (handles filter visibility) ── */
    .card-wrap {
      transition: opacity var(--ease);
    }

    .card-wrap.hide {
      opacity: 0;
      pointer-events: none;
    }

    .card-wrap.gone { display: none; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease);
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #3a3a3a;
      box-shadow: 0 10px 28px rgba(0,0,0,0.45);
    }

    .card.open {
      border-color: var(--accent-dim);
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }

    .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── GIF AREA ── */
    .gif-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--surface2);
      overflow: hidden;
    }

    .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, transparent 20%, rgba(255,255,255,0.035) 50%, transparent 80%);
      background-size: 200% 100%;
      animation: shimmer 1.8s infinite linear;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .gif-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .gif-wrap img.loaded { opacity: 1; }

    .fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }

    .fallback svg { width: 60px; height: 60px; opacity: 0.25; }

    .giphy-tag {
      position: absolute;
      bottom: 7px;
      right: 9px;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.55);
      padding: 2px 5px;
      border-radius: 3px;
      display: none;
    }

    /* ── CARD BODY ── */
    .card-body { padding: 0.9rem 1.05rem 1rem; }

    .card-num {
      font-family: 'Oswald', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .card-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1.2;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.65rem;
    }

    .badge {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
    }

    .chevron {
      color: var(--muted);
      font-size: 0.9rem;
      transition: transform var(--ease), color var(--ease);
      line-height: 1;
    }

    .card.open .chevron { transform: rotate(180deg); color: var(--accent); }

    /* ── DETAIL PANEL ── */
    .panel {
      background: #131313;
      border: 1px solid var(--accent-dim);
      border-top: none;
      border-bottom-left-radius: var(--radius);
      border-bottom-right-radius: var(--radius);
      max-height: 0;
      overflow: hidden;
      transition: max-height 380ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel.open { max-height: 700px; }

    .panel-inner { padding: 1.3rem 1.3rem 1.6rem; }

    .p-aka {
      font-size: 0.75rem;
      color: var(--accent);
      font-style: italic;
      letter-spacing: 0.03em;
      margin-bottom: 0.8rem;
    }

    .p-hold {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: rgba(232,160,32,0.1);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.28rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .p-desc {
      font-size: 0.875rem;
      line-height: 1.75;
      color: #bfbcb7;
      margin-bottom: 1rem;
    }

    .p-tip {
      border-left: 2px solid var(--accent);
      padding-left: 0.85rem;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.65;
      font-style: italic;
    }

    .p-tip::before {
      content: 'Tip: ';
      color: var(--accent);
      font-style: normal;
      font-weight: 600;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem 1.5rem;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    footer strong { color: var(--accent); font-weight: 500; }

    /* ── REDUCED MOTION ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>

      <div class="card-body">
        <div class="card-num">Movement ${String(m.id).padStart(2, '0')}</div>
        <h2 class="card-name">${m.name}</h2>
        <div class="card-foot">
          <span class="badge">${m.category}</span>
          <span class="chevron" aria-hidden="true">▾</span>
        </div>
      </div>
    </article>
    <div
      class="panel"
      id="panel-${m.id}"
      role="region"
      aria-label="${m.name} detail"
      aria-hidden="true"
    >
      <div class="panel-inner">
        <p class="p-aka">${m.aka}</p>
        <div class="p-hold">⏱ ${m.hold}</div>
        <p class="p-desc">${m.description}</p>
        <p class="p-tip">${m.tip}</p>
      </div>
    </div>
  `;

  grid.appendChild(wrap);

  const card = wrap.querySelector('.card');
  card.addEventListener('click', () => toggle(m.id));
  card.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(m.id); }
  });
});

/* ─────────────────────────────────────────────
   TOGGLE / OPEN / CLOSE
───────────────────────────────────────────── */
function toggle(id) {
  const card  = document.getElementById(`card-${id}`);
  const panel = document.getElementById(`panel-${id}`);
  const isOpen = card.classList.contains('open');

  if (openId && openId !== id) closeCard(openId);

  if (isOpen) {
    closeCard(id);
  } else {
    card.classList.add('open');
    card.setAttribute('aria-expanded', 'true');
    panel.classList.add('open');
    panel.setAttribute('aria-hidden', 'false');
    openId = id;
    fetchGif(id);
  }
}

function closeCard(id) {
  const card  = document.getElementById(`card-${id}`);
  const panel = document.getElementById(`panel-${id}`);
  if (!card) return;
  card.classList.remove('open');
  card.setAttribute('aria-expanded', 'false');
  panel.classList.remove('open');
  panel.setAttribute('aria-hidden', 'true');
  if (openId === id) openId = null;
}

/* Close on outside tap (mobile UX) */
document.addEventListener('click', e => {
  if (openId && !e.target.closest('.card-wrap')) closeCard(openId);
});

/* ─────────────────────────────────────────────
   GIPHY LOADER
───────────────────────────────────────────── */
async function fetchGif(id) {
  if (gifCache[id]) return;
  gifCache[id] = 'pending';

  const m       = movements.find(x => x.id === id);
  const img     = document.getElementById(`img-${id}`);
  const shimmer = document.getElementById(`shimmer-${id}`);
  const gtag    = document.getElementById(`gtag-${id}`);

  try {
    const endpoint = `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(m.gifQuery)}&limit=1&rating=g`;
    const res  = await fetch(endpoint);
    const json = await res.json();

    const gif = json.data && json.data[0];
    if (!gif) throw new Error('no result');

    const src = gif.images.downsized_medium?.url
             || gif.images.fixed_height?.url
             || gif.images.original?.url;

    img.onload = () => {
      img.classList.add('loaded');
      shimmer.style.display = 'none';
      gtag.style.display    = 'block';
      gifCache[id] = 'loaded';
    };
    img.onerror = () => {
      shimmer.style.display = 'none';
      gifCache[id] = 'failed';
    };
    img.src = src;
  } catch {
    shimmer.style.display = 'none';
    gifCache[id] = 'failed';
  }
}

/* ─────────────────────────────────────────────
   FILTER PILLS
───────────────────────────────────────────── */
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    if (openId) closeCard(openId);

    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');

    const filter = pill.dataset.filter;

    document.querySelectorAll('.card-wrap').forEach(wrap => {
      const match = filter === 'all' || wrap.dataset.category === filter;

      if (match) {
        wrap.classList.remove('hide', 'gone');
      } else {
        wrap.classList.add('hide');
        setTimeout(() => {
          if (wrap.classList.contains('hide')) wrap.classList.add('gone');
        }, 320);
      }
    });
  });
});
</script>
